<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>몰랑 스튜디오 — 슬라임 ASMR</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic','Segoe UI',sans-serif;user-select:none;-webkit-user-select:none;background:#ffe9f0}
  #c{position:fixed;inset:0;display:block;touch-action:none;cursor:default}
  .glass{background:rgba(255,255,255,.62);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.7);box-shadow:0 8px 24px rgba(255,120,170,.18)}
  #title{position:fixed;top:16px;left:18px;z-index:10;pointer-events:none;padding:11px 16px;border-radius:20px}
  #title h1{font-size:20px;font-weight:800;color:#e35d8f;letter-spacing:-.5px}
  #title p{font-size:11px;color:#b98a9c;margin-top:2px;font-weight:600}
  #countWrap{position:fixed;top:18px;right:16px;z-index:10;padding:9px 16px;border-radius:999px;font-size:14px;font-weight:800;color:#e35d8f;pointer-events:none}
  #countWrap.bump{animation:bump .3s ease}
  @keyframes bump{40%{transform:scale(1.22)}}
  #bar{position:fixed;top:64px;right:16px;z-index:10;display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:999px}
  #bar button{border:none;background:rgba(255,182,208,.35);border-radius:999px;padding:6px 10px;font-size:14px;font-weight:700;color:#d45585;cursor:pointer;transition:transform .15s,background .15s;white-space:nowrap}
  #bar button:hover{transform:scale(1.07);background:rgba(255,182,208,.6)}
  #vol{width:80px;accent-color:#f56ea0;cursor:pointer}
  #back{position:fixed;top:64px;left:18px;z-index:10;border:none;padding:9px 16px;border-radius:999px;font-size:13px;font-weight:800;color:#d45585;cursor:pointer;display:none}
  #back:hover{transform:scale(1.05)}
  #hint{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);z-index:10;padding:9px 20px;border-radius:999px;font-size:13px;font-weight:700;color:#c96d92;pointer-events:none;transition:opacity .5s;white-space:nowrap;max-width:94vw;overflow:hidden;text-overflow:ellipsis}
  #chips{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px;padding:8px 10px;border-radius:999px;max-width:94vw;overflow-x:auto;scrollbar-width:none}
  #chips::-webkit-scrollbar{display:none}
  #chips button{border:none;background:rgba(255,182,208,.25);border-radius:999px;padding:7px 12px;font-size:13px;font-weight:700;color:#c96d92;cursor:pointer;white-space:nowrap;transition:transform .15s,background .15s;flex:0 0 auto}
  #chips button:hover{transform:scale(1.06)}
  #chips button.on{background:#f56ea0;color:#fff;box-shadow:0 4px 12px rgba(245,110,160,.45)}
  #tip{position:fixed;z-index:20;padding:7px 14px;border-radius:999px;font-size:13px;font-weight:700;color:#d45585;pointer-events:none;display:none;white-space:nowrap}
  .heart{position:fixed;z-index:30;pointer-events:none;font-size:22px;animation:heartUp 1.15s ease-out forwards}
  @keyframes heartUp{0%{opacity:0;transform:translate(-50%,0) scale(.4) rotate(var(--r))}18%{opacity:1}100%{opacity:0;transform:translate(calc(-50% + var(--dx)),-120px) scale(1.3) rotate(var(--r))}}
  #toast{position:fixed;top:120px;left:50%;transform:translateX(-50%);z-index:10;padding:8px 18px;border-radius:999px;font-size:13px;font-weight:700;color:#c96d92;opacity:0;transition:opacity .4s;pointer-events:none;white-space:nowrap}
  #offline{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(255,236,243,.96)}
  #offline .card{max-width:340px;text-align:center;padding:34px 30px;border-radius:26px;background:#fff;box-shadow:0 16px 44px rgba(230,110,160,.25)}
  #offline .card b{font-size:18px;color:#e35d8f}
  #offline .card p{font-size:14px;color:#a08691;margin-top:10px;line-height:1.6}
  @media (max-width:640px){
    #title{top:10px;left:10px;padding:8px 12px}#title h1{font-size:16px}#title p{font-size:9px}
    #countWrap{top:12px;right:10px;font-size:12px;padding:7px 12px}
    #bar{top:54px;right:10px}#vol{width:56px}
    #back{top:54px;left:10px;font-size:12px}
    #hint{font-size:11px;bottom:80px;padding:8px 14px}
    #chips button{font-size:12px;padding:6px 10px}
  }
</style>

  "imports": {

<body>
<canvas id="c"></canvas>
<div id="title" class="glass"><h1>몰랑 스튜디오</h1><p>슬라임 · 스퀴시 · 슬랑이 · 왁뿌볼 ASMR 놀이터</p></div>
<div id="countWrap" class="glass">🫧 <span id="count">0</span> 몰랑</div>
<div id="bar" class="glass">
  <button id="mute" title="소리 켜기/끄기">🔊</button>
  <input id="vol" type="range" min="0" max="100" value="80" title="볼륨">
  <button id="reset" title="모두 처음 모양으로">↺ 리셋</button>
</div>
<button id="back" class="glass">⊙ 전체 보기</button>
<div id="hint" class="glass">👇 아래에서 만지고 싶은 아이를 골라보세요</div>
<div id="chips" class="glass"></div>
<div id="tip" class="glass"></div>
<div id="toast" class="glass">🔊 소리가 켜졌어요 — 이어폰 추천!</div>
<div id="offline"><div class="card"><b>인터넷 연결이 필요해요 🥲</b><p>3D 라이브러리를 불러오지 못했어요.<br>연결을 확인한 뒤 새로고침(F5) 해주세요.</p></div></div>

<script>
  window.addEventListener('load', () => setTimeout(() => {
    if (!window.__slimeBooted && !document.hidden) document.getElementById('offline').style.display = 'flex';
  }, 6000));
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { mergeVertices } from 'three/addons/utils/BufferGeometryUtils.js';

/* localStorage는 사파리 프라이빗 모드에서 throw 가능 */
const store = {
  get(k) { try { return localStorage.getItem(k); } catch { return null; } },
  set(k, v) { try { localStorage.setItem(k, v); } catch {} }
};

/* ============================== 사운드 엔진 ==============================
   장난감마다 sfx 프로필(wet/crunch/sticky/foam/bubbles/pitch/low/release)이 달라
   같은 동작이라도 전혀 다른 소리가 난다. */
const Sound = {
  ctx: null, bus: null, master: null, noise: null,
  vol: Math.min(1, Math.max(0, parseFloat(store.get('slime-vol') ?? '0.8'))),
  muted: store.get('slime-mute') === '1',
  init() {
    if (this.ctx) { if (this.ctx.state !== 'running') this.ctx.resume().catch(() => {}); return; }
    const C = window.AudioContext || window.webkitAudioContext;
    if (!C) return;
    const ctx = this.ctx = new C();
    const comp = ctx.createDynamicsCompressor();
    comp.threshold.value = -18; comp.knee.value = 22; comp.ratio.value = 6;
    comp.attack.value = .004; comp.release.value = .16;
    const master = ctx.createGain();
    master.gain.value = this.muted ? 0 : this.vol;
    comp.connect(master); master.connect(ctx.destination);
    this.master = master;
    const bus = ctx.createGain();
    bus.connect(comp);
    const conv = ctx.createConvolver();
    conv.buffer = this.impulse(1.7, 2.6);
    const wet = ctx.createGain(); wet.gain.value = .07; // ASMR은 드라이 클로즈마이크가 생명

    bus.connect(conv); conv.connect(wet); wet.connect(comp);
    this.bus = bus;
    const len = ctx.sampleRate * 1.5;
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    this.noise = buf;
  },
  impulse(sec, decay) {
    const ctx = this.ctx, rate = ctx.sampleRate, len = rate * sec;
    const buf = ctx.createBuffer(2, len, rate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
    }
    return buf;
  },
  env(g, t, a, peak, dec) {
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(Math.max(0.0002, peak), t + a);
    g.gain.exponentialRampToValueAtTime(0.0001, t + a + dec);
  },
  pan(x) {
    const p = this.ctx.createStereoPanner();
    // 위치 + 랜덤 지터 = 바이노럴 근접감 흉내
    p.pan.value = Math.max(-.8, Math.min(.8, x / 6 + (Math.random() - .5) * .22));
    p.connect(this.bus);
    return p;
  },
  setVol(v) { this.vol = v; store.set('slime-vol', String(v)); if (this.master && !this.muted) this.master.gain.setTargetAtTime(v, this.ctx.currentTime, .05); },
  setMute(m) { this.muted = m; store.set('slime-mute', m ? '1' : '0'); if (this.master) this.master.gain.setTargetAtTime(m ? 0 : this.vol, this.ctx.currentTime, .03); },

  /* ---- 레이어 ---- */
  thump(t, out, i, pitch = 1) {
    const ctx = this.ctx;
    const o = ctx.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime((70 + i * 70 + Math.random() * 25) * pitch, t);
    o.frequency.exponentialRampToValueAtTime(36 * pitch, t + .13);
    const g = ctx.createGain(); this.env(g, t, .004, .05 + .2 * i, .12);
    o.connect(g); g.connect(out); o.start(t); o.stop(t + .25);
  },
  squelch(t, out, i, pitch = 1, mul = 1) {
    const ctx = this.ctx;
    for (let k = 0; k < 2; k++) {
      const src = ctx.createBufferSource(); src.buffer = this.noise;
      src.playbackRate.value = .6 + Math.random() * .8;
      const bp = ctx.createBiquadFilter(); bp.type = 'bandpass';
      bp.Q.value = 1.6 + Math.random() * 2;
      const t0 = t + k * .018;
      bp.frequency.setValueAtTime((380 + Math.random() * 900 * (.5 + i)) * pitch, t0);
      bp.frequency.exponentialRampToValueAtTime((110 + Math.random() * 90) * pitch, t0 + .09 + .09 * i);
      const g = ctx.createGain();
      this.env(g, t0, .006, (.09 + .13 * i) * (k ? .55 : 1) * mul, .1 + .13 * i);
      src.connect(bp); bp.connect(g); g.connect(out);
      src.start(t0, Math.random()); src.stop(t0 + .5);
    }
  },
  /* 기포 팝: 사인파(=삐용음) 금지. 고Q 밴드패스 노이즈 버스트 = 물기 있는 '플립' */
  pops(t, out, i, pitch = 1, mul = 1) {
    const ctx = this.ctx;
    const nb = Math.round((1 + Math.random() * 2 + i * 2.2) * Math.min(1.5, mul));
    for (let k = 0; k < nb; k++) {
      const d0 = Math.random() * (.05 + .1 * i);
      const src = ctx.createBufferSource(); src.buffer = this.noise;
      src.playbackRate.value = .8 + Math.random() * .6;
      const bp = ctx.createBiquadFilter(); bp.type = 'bandpass';
      const f = (450 + Math.random() * 1200) * pitch;
      bp.frequency.setValueAtTime(f, t + d0);
      bp.frequency.exponentialRampToValueAtTime(f * .55, t + d0 + .05);
      bp.Q.value = 7 + Math.random() * 5;
      const g = ctx.createGain();
      this.env(g, t + d0, .003, (.07 + .09 * Math.random() + .07 * i) * mul, .035 + Math.random() * .03);
      src.connect(bp); bp.connect(g); g.connect(out);
      src.start(t + d0, Math.random()); src.stop(t + d0 + .12);
    }
  },
  /* 크런치 슬라임 뽀득/바삭 */
  crunchG(t, out, i, mul = 1, pitch = 1) {
    const ctx = this.ctx;
    const n = 3 + Math.round(i * 5);
    for (let k = 0; k < n; k++) {
      const d0 = Math.random() * (.05 + .06 * i);
      const src = ctx.createBufferSource(); src.buffer = this.noise;
      src.playbackRate.value = 1 + Math.random();
      const bp = ctx.createBiquadFilter(); bp.type = 'bandpass';
      bp.frequency.value = (1200 + Math.random() * 2200) * pitch; bp.Q.value = 3.5;
      const g = ctx.createGain();
      this.env(g, t + d0, .001, (.05 + .05 * Math.random()) * mul * (0.6 + i * .6), .018 + Math.random() * .02);
      src.connect(bp); bp.connect(g); g.connect(out);
      src.start(t + d0, Math.random()); src.stop(t + d0 + .07);
    }
  },
  /* 슬랑이 찐득 필링 */
  ticksG(t, out, i, mul = 1) {
    const ctx = this.ctx;
    const n = 2 + Math.round(i * 3);
    for (let k = 0; k < n; k++) {
      const d0 = k * .028 + Math.random() * .02;
      const src = ctx.createBufferSource(); src.buffer = this.noise;
      src.playbackRate.value = .8 + Math.random() * .5;
      const bp = ctx.createBiquadFilter(); bp.type = 'bandpass';
      bp.frequency.value = 480 + Math.random() * 450; bp.Q.value = 6;
      const g = ctx.createGain();
      this.env(g, t + d0, .002, .06 * mul, .03);
      src.connect(bp); bp.connect(g); g.connect(out);
      src.start(t + d0, Math.random()); src.stop(t + d0 + .07);
    }
  },
  foamG(t, out, i, mul = 1) {
    const ctx = this.ctx;
    const src = ctx.createBufferSource(); src.buffer = this.noise; src.playbackRate.value = .5;
    const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 430;
    const g = ctx.createGain(); this.env(g, t, .015, (.05 + .09 * i) * mul, .4);
    src.connect(lp); lp.connect(g); g.connect(out);
    src.start(t, Math.random()); src.stop(t + .6);
  },

  /* ---- 장난감 API: sfx 프로필로 레이어 조합 ---- */
  press(sfx, i, x) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime, out = this.pan(x), p = sfx.pitch, v = sfx.vol ?? 1;
    this.thump(t, out, i * (sfx.low ?? 1) * v, p);
    if (sfx.wet) { this.squelch(t, out, i, p, sfx.wet * v); this.pops(t, out, i, p, (sfx.bubbles ?? 1) * .9 * v); }
    if (sfx.crunch) this.crunchG(t, out, i, sfx.crunch * v, p);
    if (sfx.sticky) this.ticksG(t, out, i * .7, sfx.sticky * .7 * v);
    if (sfx.foam) this.foamG(t, out, i, sfx.foam * v);
  },
  drag(sfx, i, x) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime, out = this.pan(x), p = sfx.pitch, v = sfx.vol ?? 1;
    if (sfx.wet) { this.squelch(t, out, i * .7, p, sfx.wet * .8 * v); if (Math.random() < .6) this.pops(t, out, i * .6, p, (sfx.bubbles ?? 1) * .6 * v); }
    if (sfx.crunch) this.crunchG(t, out, i, sfx.crunch * .9 * v, p);
    if (sfx.sticky) this.ticksG(t, out, i, sfx.sticky * v);
    if (sfx.foam && Math.random() < .5) this.foamG(t, out, i * .6, sfx.foam * .6 * v);
  },
  stretchTick(sfx, x) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime, out = this.pan(x);
    if (sfx.sticky) { this.ticksG(t, out, .8, sfx.sticky); return; }
    const src = this.ctx.createBufferSource(); src.buffer = this.noise;
    src.playbackRate.value = 1.4 + Math.random();
    const hp = this.ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 2300 + Math.random() * 1500;
    const g = this.ctx.createGain(); this.env(g, t, .001, .028 + .03 * Math.random(), .03);
    src.connect(hp); hp.connect(g); g.connect(out);
    src.start(t, Math.random()); src.stop(t + .06);
  },
  release(sfx, i, x) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime, out = this.pan(x), p = sfx.pitch, v = sfx.vol ?? 1;
    const style = sfx.release || 'boing';
    if (style === 'foam') { this.foamG(t, out, .3 + i * .6, 1.2 * v); this.pops(t, out, i * .4, p * .7, .5 * v); return; }
    if (style === 'crunch') { /* 크런치: 튕김 없이 알갱이가 자잘하게 가라앉는 소리 */
      this.crunchG(t, out, i * .8, (sfx.crunch ?? 1) * .8 * v, p);
      this.crunchG(t + .12, out, i * .4, (sfx.crunch ?? 1) * .45 * v, p);
      this.thump(t, out, i * .4 * v, p);
      return;
    }
    if (style === 'slap') {
      this.thump(t, out, Math.min(1, .3 + i) * v, p * .9);
      this.squelch(t, out, i * .8, p, .8 * v);
      this.ticksG(t + .03, out, i, 1 * v);
      return;
    }
    /* wet(구 boing) / jelly — 오실레이터 삐용음 없이 젖은 소리로만 놓인다 */
    const jl = style === 'jelly';
    this.thump(t, out, Math.min(1, .25 + i * .8) * v, p);
    this.squelch(t, out, i, p, (sfx.wet ?? .7) * v);
    this.pops(t, out, i * .8, p * (jl ? 1.25 : 1), (sfx.bubbles ?? 1) * .9 * v);
    if (jl) { /* 탱글: 잦아드는 잔진동처럼 스쿼치가 한 번 더 */
      this.squelch(t + .09, out, i * .55, p * 1.15, (sfx.wet ?? .7) * .6 * v);
      this.pops(t + .17, out, i * .3, p * 1.3, .5 * v);
    }
    if (sfx.sticky) this.ticksG(t + .02, out, i * .8, sfx.sticky * .8 * v);
    if (sfx.crunch) this.crunchG(t, out, i * .8, sfx.crunch * .8 * v, p);
  },
  /* 왁뿌볼 껍질 깨기: 뿌직! first=첫 크랙(제일 큰 와그작, 속심이 울림을 먹어 둔탁) */
  crack(i, x, first = false) {
    if (!this.ctx) return;
    const ctx = this.ctx, t = ctx.currentTime, out = this.pan(x);
    const boost = first ? 1.7 : 1;
    const src = ctx.createBufferSource(); src.buffer = this.noise;
    src.playbackRate.value = 1.6;
    const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = first ? 1100 : 1600;
    const g = ctx.createGain(); this.env(g, t, .001, (.22 + .15 * i) * boost, first ? .06 : .035);
    src.connect(hp); hp.connect(g); g.connect(out);
    src.start(t, Math.random()); src.stop(t + .1);
    const o = ctx.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(240 * (0.9 + Math.random() * .25), t);
    o.frequency.exponentialRampToValueAtTime(110, t + .05);
    const og = ctx.createGain(); this.env(og, t, .002, .2 * boost, .07);
    o.connect(og); og.connect(out); o.start(t); o.stop(t + .15);
    if (first) { /* 서브 썸: 몸통 울림 */
      const s = ctx.createOscillator(); s.type = 'sine';
      s.frequency.setValueAtTime(150, t);
      s.frequency.exponentialRampToValueAtTime(70, t + .12);
      const sg = ctx.createGain(); this.env(sg, t, .003, .3, .14);
      s.connect(sg); sg.connect(out); s.start(t); s.stop(t + .25);
    }
    /* 부스러기: 2~7kHz 불규칙 클릭 */
    const n = 3 + Math.round(Math.random() * 3 + i * 2);
    for (let k = 0; k < n; k++) {
      const d0 = .02 + Math.random() * .12;
      const s2 = ctx.createBufferSource(); s2.buffer = this.noise;
      s2.playbackRate.value = 1 + Math.random();
      const bp = ctx.createBiquadFilter(); bp.type = 'bandpass';
      bp.frequency.value = 2000 + Math.random() * 4500; bp.Q.value = 3;
      const g2 = ctx.createGain(); this.env(g2, t + d0, .001, .04 + .04 * Math.random(), .02);
      s2.connect(bp); bp.connect(g2); g2.connect(out);
      s2.start(t + d0, Math.random()); s2.stop(t + d0 + .05);
    }
  },
  pluck(x = 0) { /* 선택: 아주 작은 무광 탭 (톤 없음) */
    if (!this.ctx) return;
    const t = this.ctx.currentTime, out = this.pan(x);
    const src = this.ctx.createBufferSource(); src.buffer = this.noise;
    const lp = this.ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 650;
    const g = this.ctx.createGain(); this.env(g, t, .004, .07, .07);

      y -= dimple * Math.exp(-hr / .09) * r;
    }
    p.setXYZ(i, x, y, z);
  }
  g.computeVertexNormals();
  return g;
}
/* RoundedBoxGeometry는 면 중앙에 정점이 없어(모서리 집중) 소프트바디가 뭉개진다.
   균일 분할 BoxGeometry를 코어 박스에서 rad 거리로 정규화 → 정점 균일한 라운드 박스 */
function cubeGeo(w, h, d, rad, segs = 22) {
  let g = new THREE.BoxGeometry(w, h, d, segs, segs, segs);
  g.deleteAttribute('normal'); g.deleteAttribute('uv');
  g = mergeVertices(g, 1e-4);
  const hw = w / 2 - rad, hh = h / 2 - rad, hd = d / 2 - rad;
  const p = g.attributes.position;
  for (let i = 0; i < p.count; i++) {
    _v1.set(p.getX(i), p.getY(i), p.getZ(i));
    _v2.set(
      Math.max(-hw, Math.min(hw, _v1.x)),
      Math.max(-hh, Math.min(hh, _v1.y)),
      Math.max(-hd, Math.min(hd, _v1.z))
    );
    _v3.copy(_v1).sub(_v2);
    const l = _v3.length();
    if (l > 1e-6) _v3.multiplyScalar(rad / l);
    p.setXYZ(i, _v2.x + _v3.x, _v2.y + _v3.y, _v2.z + _v3.z);
  }
  g.computeVertexNormals();
  return g;
}
function cheeseGeo() { // 왕치즈 슬랑이: 반투명 치즈 슬랩 + 스위스 치즈 구멍
  const g = cubeGeo(2.15, 1.05, 1.5, .3, 26);
  const holes = [
    { c: new THREE.Vector3(.55, .53, .33), r: .34 },
    { c: new THREE.Vector3(-.52, .53, -.28), r: .28 },
    { c: new THREE.Vector3(-.12, .53, .44), r: .2 },
    { c: new THREE.Vector3(.4, .12, .76), r: .24 },
    { c: new THREE.Vector3(-.62, .02, -.76), r: .27 },
    { c: new THREE.Vector3(1.08, .14, -.22), r: .27 }
  ];
  const inner = holes.map(h => h.c.clone().multiplyScalar(.55)); // 크레이터가 모이는 안쪽 점
  const p = g.attributes.position;
  for (let i = 0; i < p.count; i++) {
    _v1.set(p.getX(i), p.getY(i), p.getZ(i));
    for (let hI = 0; hI < holes.length; hI++) {
      const d = _v1.distanceTo(holes[hI].c);
      if (d < holes[hI].r) {
        const w = (1 - d / holes[hI].r) ** 2 * .85;
        _v1.lerp(inner[hI], w);
      }
    }
    p.setXYZ(i, _v1.x, _v1.y, _v1.z);
  }
  g.computeVertexNormals();
  return g;
}
function slangGeo() { // 쭉쭉이: 통통한 몸통 (X축으로 눕힘)
  /* CapsuleGeometry는 원통부에 길이방향 정점이 없어(링 2개) 늘리면 종이접기가 된다.
     라테로 전 구간 균일 밀도 캡슐을 만든다. */
  const pts = [];
  const r = .62, len = 1.9, N1 = 14, N2 = 24;
  for (let i = 0; i <= N1; i++) {
    const a = -Math.PI / 2 + (i / N1) * (Math.PI / 2);
    pts.push(new THREE.Vector2(Math.cos(a) * r, -len / 2 + Math.sin(a) * r));
  }
  for (let i = 1; i <= N2; i++) pts.push(new THREE.Vector2(r, -len / 2 + (i / N2) * len));
  for (let i = 1; i <= N1; i++) {
    const a = (i / N1) * (Math.PI / 2);
    pts.push(new THREE.Vector2(Math.cos(a) * r, len / 2 + Math.sin(a) * r));
  }
  let g = new THREE.LatheGeometry(pts, 42);
  g.rotateZ(-Math.PI / 2);
  g = prepGeo(g);
  const p = g.attributes.position;
  for (let i = 0; i < p.count; i++) {
    let x = p.getX(i), y = p.getY(i), z = p.getZ(i);
    const s = 1 + .05 * Math.sin(4.2 * x + 1.5) * Math.sin(3.1 * z);
    y *= .86 * s;
    z *= s;
    if (x > .7) { const m = 1 + (x - .7) * .18; y *= m; z *= m; } // 머리 쪽 통통
    p.setXYZ(i, x, y, z);
  }
  g.computeVertexNormals();
  return g;
}

const WaxShell = {
  toy: waxInner, mesh: null, aliveCount: 0, faceCount: 0, alive: null, orig: null, centroids: null,
  build() {
    const geo = new THREE.IcosahedronGeometry(1.0 * 1.09, 6); // non-indexed 삼각형 수프 (980조각)

      _v1.set(p.getX(i), p.getY(i), p.getZ(i));
      const s = 1 + .018 * Math.sin(5.1 * _v1.x + 1.2) * Math.sin(4.3 * _v1.y) * Math.sin(3.7 * _v1.z + 2);
      p.setXYZ(i, _v1.x * s, _v1.y * s * .98, _v1.z * s);
    }
    geo.computeVertexNormals();
    { /* 삼각형 수프는 플랫 노멀이 나온다 → 구형이므로 위치 정규화로 매끈한 노멀 */
      const nor = geo.attributes.normal;
      for (let i = 0; i < p.count; i++) {
        _v1.set(p.getX(i), p.getY(i), p.getZ(i)).normalize();
        nor.setXYZ(i, _v1.x, _v1.y, _v1.z);
      }
    }
    this.geo = geo;
    this.faceCount = p.count / 3;
    this.alive = new Uint8Array(this.faceCount).fill(1);
    this.aliveCount = this.faceCount;
    this.orig = Float32Array.from(p.array);
    this.centroids = new Float32Array(this.faceCount * 3);
    for (let f = 0; f < this.faceCount; f++) {
      for (let a = 0; a < 3; a++) {
        this.centroids[f * 3 + a] = (p.array[f * 9 + a] + p.array[f * 9 + 3 + a] + p.array[f * 9 + 6 + a]) / 3;
      }
    }
    /* 아트박스 청사과: 크리스마스 오너먼트 같은 광택 초록 왁스 */
    const mat = new THREE.MeshPhysicalMaterial({
      color: '#3fbf4f', roughness: .12, clearcoat: 1, clearcoatRoughness: .12,
      side: THREE.DoubleSide, envMapIntensity: 1 // 오너먼트처럼 매끈한 광택
    });
    this.mesh = new THREE.Mesh(geo, mat);
    this.mesh.castShadow = true;
    this.mesh.userData.shellOf = this.toy;
    geo.computeBoundingSphere();
    scene.add(this.mesh);
    const stem = new THREE.Mesh(
      new THREE.CylinderGeometry(.035, .055, .34, 8),
      new THREE.MeshStandardMaterial({ color: '#7a4a26', roughness: .8 })
    );
    stem.position.set(0, 1.15, 0); stem.rotation.z = .18;
    const leaf = new THREE.Mesh(
      new THREE.SphereGeometry(.17, 10, 8),
      new THREE.MeshStandardMaterial({ color: '#4d9e3f', roughness: .5 })
    );
    leaf.scale.set(1.5, .32, .7); leaf.position.set(.24, 1.22, .02); leaf.rotation.z = -.45;
    this.mesh.add(stem, leaf);
    this.sync();
  },
  sync() {
    if (!this.mesh) return;
    this.mesh.position.copy(this.toy.mesh.position);
    this.mesh.rotation.copy(this.toy.mesh.rotation);
    this.mesh.scale.copy(this.toy.mesh.scale); // 속심의 숨쉬기/움찔거림을 껍질도 따라가야 살아있는 느낌
    this.mesh.visible = this.aliveCount > 0;
  },
  chipAt(worldPoint, radius) {
    if (!this.mesh || !this.aliveCount) return 0;
    const local = this.mesh.worldToLocal(_v1.copy(worldPoint));
    const p = this.geo.attributes.position.array;
    let removed = 0;
    for (let f = 0; f < this.faceCount; f++) {
      if (!this.alive[f]) continue;
      const dx = this.centroids[f * 3] - local.x, dy = this.centroids[f * 3 + 1] - local.y, dz = this.centroids[f * 3 + 2] - local.z;
      if (dx * dx + dy * dy + dz * dz > radius * radius) continue;
      this.alive[f] = 0; this.aliveCount--; removed++;
      /* 파편 스폰 후 면을 퇴화시켜 숨김(레이캐스트도 안 맞음) */
      _v2.set(this.centroids[f * 3], this.centroids[f * 3 + 1], this.centroids[f * 3 + 2]);
      const world = this.mesh.localToWorld(_v2.clone());
      if (removed <= 8) Shards.spawn(world, _v2.normalize(), '#3fbf4f');
      for (let a = 0; a < 3; a++) p[f * 9 + a] = p[f * 9 + 3 + a] = p[f * 9 + 6 + a] = this.centroids[f * 3 + a];
    }
    if (removed) this.geo.attributes.position.needsUpdate = true;
    return removed;
  },
  restore() {
    if (!this.mesh) return;
    this.geo.attributes.position.array.set(this.orig);
    this.geo.attributes.position.needsUpdate = true;
    this.alive.fill(1);
    this.aliveCount = this.faceCount;
    this.mesh.visible = true;
  },
  peeled() { return this.aliveCount <= 0; },
  finishIfAlmost() {
    if (!this.aliveCount || this.aliveCount > this.faceCount * .1) return false;
    /* 마지막 조각들 우수수 */
    const p = this.geo.attributes.position.array;
    for (let f = 0; f < this.faceCount; f++) {
      if (!this.alive[f]) continue;
      this.alive[f] = 0;
      _v2.set(this.centroids[f * 3], this.centroids[f * 3 + 1], this.centroids[f * 3 + 2]);
      if (Math.random() < .4) Shards.spawn(this.mesh.localToWorld(_v2.clone()), _v2.clone().normalize(), '#3fbf4f');

    this.mesh.visible = false;

const Shards = {

  spawn(p, dir, color) {

function sparkleTexture() {
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(32, 32, 0, 32, 32, 32);
  gr.addColorStop(0, 'rgba(255,255,255,1)');
  gr.addColorStop(.35, 'rgba(255,240,250,.7)');
  gr.addColorStop(1, 'rgba(255,240,250,0)');
  g.fillStyle = gr; g.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
}
const sparkTex = sparkleTexture();

const Burst = {
  N: 240, i: 0, pos: null, col: null, vel: [], life: new Float32Array(240),
  init() {
    const geo = new THREE.BufferGeometry();
    this.pos = new Float32Array(this.N * 3).fill(-999);
    this.col = new Float32Array(this.N * 3);
    geo.setAttribute('position', new THREE.BufferAttribute(this.pos, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(this.col, 3));
    for (let i = 0; i < this.N; i++) this.vel.push(new THREE.Vector3());
    this.geo = geo;
    const pts = new THREE.Points(geo, new THREE.PointsMaterial({
      size: .14, map: sparkTex, transparent: true, depthWrite: false,
      blending: THREE.AdditiveBlending, vertexColors: true, sizeAttenuation: true
    }));
    pts.frustumCulled = false;
    scene.add(pts);
  },
  burst(p, n, power, palette) {
    palette = palette || [[1, .8, .9], [1, .95, .7], [1, 1, 1], [.85, .95, 1]];
    for (let k = 0; k < n; k++) {
      const i = this.i = (this.i + 1) % this.N;
      this.pos[i * 3] = p.x; this.pos[i * 3 + 1] = p.y; this.pos[i * 3 + 2] = p.z;
      this.vel[i].set(Math.random() - .5, Math.random() * .8 + .2, Math.random() - .5).multiplyScalar(2.2 * power);
      this.life[i] = .7 + Math.random() * .5;
      const c = palette[(Math.random() * palette.length) | 0];
      this.col[i * 3] = c[0]; this.col[i * 3 + 1] = c[1]; this.col[i * 3 + 2] = c[2];
    }
  },
  update(dt) {
    for (let i = 0; i < this.N; i++) {
      if (this.life[i] <= 0) continue;
      this.life[i] -= dt;
      const l = Math.max(0, this.life[i]);
      this.vel[i].y += 1.1 * dt;
      this.vel[i].multiplyScalar(1 - 2.2 * dt);
      this.pos[i * 3] += this.vel[i].x * dt;
      this.pos[i * 3 + 1] += this.vel[i].y * dt;
      this.pos[i * 3 + 2] += this.vel[i].z * dt;
      if (l < .45) {
        const fade = Math.max(0, 1 - dt / Math.max(l, .01));
        this.col[i * 3] *= fade; this.col[i * 3 + 1] *= fade; this.col[i * 3 + 2] *= fade;
      }
      if (l <= 0) this.pos[i * 3 + 1] = -999;
    }
    this.geo.attributes.position.needsUpdate = true;
    this.geo.attributes.color.needsUpdate = true;
  }
};
Burst.init();

const Dust = (() => {
  const N = 80;
  const pos = new Float32Array(N * 3), col = new Float32Array(N * 3), ph = new Float32Array(N);
  for (let i = 0; i < N; i++) {
    const a = Math.random() * Math.PI * 2, r = 1 + Math.random() * 6.5;
    pos[i * 3] = Math.cos(a) * r;
    pos[i * 3 + 1] = .5 + Math.random() * 4.5;
    pos[i * 3 + 2] = Math.sin(a) * r;
    ph[i] = Math.random() * Math.PI * 2;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));

  }));

let selected = null;
let camTween = null;
const easeIO = s => s < .5 ? 4 * s * s * s : 1 - Math.pow(-2 * s + 2, 3) / 2;

function tweenCam(pos, target, dur = .9) {
  camTween = { t0: performance.now() / 1000, dur, fp: camera.position.clone(), ft: controls.target.clone(), tp: pos, tt: target };
}
function focusView(toy) {
  const p = toy.mesh.position, R = toy.R;
  const target = new THREE.Vector3(p.x * .92, p.y + R * .1, p.z * .92);
  const dir = camera.position.clone().sub(controls.target); dir.y = 0;
  if (dir.lengthSq() < .001) dir.set(0, 0, 1); else dir.normalize();
  const pos = target.clone().addScaledVector(dir, R * 5.2);
  pos.y = target.y + R * 2.7;

}
function endAllGrabs() {
  for (const [, g] of grabs) { if (g.toy) g.toy.endGrab(); Sound.bedStop(g.bed); }
  grabs.clear();
}
function select(toy) {

  endAllGrabs();

  toys.forEach(t => t.focusTarget = (!toy || t === toy) ? 1 : .52);

const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
const grabs = new Map(); // pointerId -> {mode:'grab'|'chip', toy, ...}
let squishCount = 0, toastShown = false;

const el = {
  count: document.getElementById('count'),

function pickAll(e) {
  ndc.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  raycaster.setFromCamera(ndc, camera);
  const list = WaxShell.mesh && WaxShell.mesh.visible ? [...toyMeshes, WaxShell.mesh] : toyMeshes;
  const hits = raycaster.intersectObjects(list, false);
  if (!hits.length) return null;
  const h = hits[0];
  const isShell = !!h.object.userData.shellOf;
  return { toy: isShell ? h.object.userData.shellOf : h.object.userData.toy, point: h.point, normal: h.face ? h.face.normal : null, isShell };
}

function showToastOnce() {
  if (toastShown) return;
  toastShown = true;
  if (Sound.muted) el.toast.textContent = '🔇 음소거 상태예요 — 우측 위 버튼으로 켤 수 있어요';
  el.toast.style.opacity = '1';

}
function toast(msg, ms = 2400) {

}

function spawnHearts(worldPos, n) {
  _v3.copy(worldPos).project(camera);
  const sx = (_v3.x * .5 + .5) * innerWidth, sy = (-_v3.y * .5 + .5) * innerHeight;

  for (let i = 0; i < n; i++) {

    d.textContent = emo[(Math.random() * emo.length) | 0];

    d.style.top = (sy + (Math.random() - .5) * 20) + 'px';
    d.style.setProperty('--dx', ((Math.random() - .5) * 70) + 'px');
    d.style.setProperty('--r', ((Math.random() - .5) * 40) + 'deg');
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 1200);

function bumpCount() {
  squishCount++;
  el.count.textContent = squishCount;
  el.countWrap.classList.remove('bump');
  void el.countWrap.offsetWidth;
  el.countWrap.classList.add('bump');

const GREEN_PUFF = [[.55, 1, .6], [.75, 1, .78], [1, 1, 1]];
function doChip(g, worldPoint) {
  const toy = g.toy;
  const first = WaxShell.aliveCount === WaxShell.faceCount;
  const removed = WaxShell.chipAt(worldPoint, toy.R * .46);
  if (!removed) return;
  toy.wobV += first ? .9 : .6; // 두드릴 때마다 공이 물컹 움츠러든다
  Sound.crack(Math.min(1, removed / 14), toy.mesh.position.x, first);
  Burst.burst(worldPoint, first ? 16 : 5, first ? .9 : .5, GREEN_PUFF);
  navigator.vibrate?.(first ? 30 : 14);
  if (first) toast('와그작! 🍏 사과향이 퍼져요');
  bumpCount();
  if (WaxShell.finishIfAlmost() || WaxShell.peeled()) {
    toast('🎉 껍질 다 깠다! 속말랑이가 나왔어요');
    Burst.burst(toy.mesh.position.clone().setY(toy.mesh.position.y + .5), 30, 1.2);
    spawnHearts(toy.mesh.position, 5);
    el.hint.textContent = `${toy.emoji} 점토를 꾹꾹 눌러 모양을 빚어보세요 (↺리셋=새 왁뿌볼)`;
  }
}

function onDown(e) {
  if (e.target !== canvas) return; // UI 위 클릭은 UI에게
  Sound.init();
  showToastOnce();
  /* 조물조물 중 두 번째 손가락 → 카메라 회전 방지 */
  if (grabs.size > 0) { e.stopPropagation(); e.preventDefault(); return; }
  const hit = pickAll(e);
  if (!hit) return; // 빈 곳 → OrbitControls
  e.stopPropagation();
  e.preventDefault();
  try { canvas.setPointerCapture(e.pointerId); } catch (_) {}

  if (!selected || hit.toy !== selected) { select(hit.toy); return; }

  const toy = hit.toy;
  if (toy.grab) return;
  const hitWorld = hit.point.clone();
  const hitLocal = toy.mesh.worldToLocal(hitWorld.clone());
  /* 껍질 히트면 방사 방향이 가장 안정적인 노멀 */
  const nLocal = hit.isShell ? hitLocal.clone().normalize()
    : (hit.normal ? hit.normal.clone() : new THREE.Vector3(0, 1, 0));
  toy.startGrab(hitLocal, nLocal, performance.now() / 1000);
  const camDir = camera.getWorldDirection(_v1).clone();
  grabs.set(e.pointerId, {
    mode: 'grab', toy, hitWorld,
    plane: new THREE.Plane().setFromNormalAndCoplanarPoint(camDir.negate(), hitWorld),
    lastWorld: hitWorld.clone(), lastT: performance.now(),
    acc: 0, lastGrainT: 0, lastMag: 0,
    waxChip: toy.type === 'wax', lastChipT: 0,
    bed: Sound.bed(toy.sfx, toy.mesh.position.x) // 만지는 동안 흐르는 연속음
  });
  if (toy.type === 'wax') doChip(grabs.get(e.pointerId), hitWorld); // 누르는 순간 그 자리 왁스가 부서진다
  Sound.press(toy.sfx, .28 + Math.random() * .14, toy.mesh.position.x);
  Burst.burst(hitWorld, 7, .5);
  navigator.vibrate?.(10);
  canvas.style.cursor = 'grabbing';
  el.tip.style.display = 'none';
}

let lastHover = 0;
function onMove(e) {
  const g = grabs.get(e.pointerId);
  if (!g) {
    if (e.pointerType === 'mouse' && grabs.size === 0 && e.target === canvas) {
      const now = performance.now();
      if (now - lastHover > 60) {
        lastHover = now;
        const hit = pickAll(e);
        if (hit) {
          canvas.style.cursor = 'pointer';
          el.tip.style.display = 'block';
          el.tip.textContent = (!selected || hit.toy !== selected)
            ? `${hit.toy.emoji} ${hit.toy.name} — 탭해서 선택`
            : `${hit.toy.emoji} ${hit.toy.name}`;
          el.tip.style.left = Math.min(innerWidth - 180, e.clientX + 16) + 'px';
          el.tip.style.top = (e.clientY + 20) + 'px';
          if (selected && hit.toy === selected) canvas.style.cursor = 'grab';
        } else {
          canvas.style.cursor = 'default';
          el.tip.style.display = 'none';
        }
      }
    }
    return;
  }
  e.preventDefault();

  const toy = g.toy, grab = toy.grab;
  if (!grab) return;
  ndc.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  raycaster.setFromCamera(ndc, camera);
  if (!raycaster.ray.intersectPlane(g.plane, _v1)) return;

  const pA = toy.mesh.worldToLocal(_v3.copy(g.hitWorld));
  const dispLocal = toy.mesh.worldToLocal(_v1.clone()).sub(pA);
  grab.disp.copy(dispLocal);

  const now = performance.now();
  const moved = _v2.copy(_v1).sub(g.lastWorld).length();
  g.acc += moved;
  const speed = moved / Math.max(1, now - g.lastT) * 1000;
  g.lastWorld.copy(_v1); g.lastT = now;
  Sound.bedMove(g.bed, speed); // 연속음이 손 속도를 따라간다
  if (g.waxChip && now - g.lastChipT > 110) { // 누른 채 문지르면 그 경로의 왁스가 계속 부서진다
    g.lastChipT = now;
    doChip(g, _v1);
  }
  if (g.acc > .3 && now - g.lastGrainT > 90) {
    g.lastGrainT = now; g.acc = 0;
    Sound.drag(toy.sfx, Math.min(.8, .12 + speed * .06), toy.mesh.position.x);
    if (Math.random() < .4) Burst.burst(_v1, 2, .3);
  }
  if (grab.mag > toy.R * .85 && grab.mag > g.lastMag && Math.random() < .35) {
    Sound.stretchTick(toy.sfx, toy.mesh.position.x);
  }
  g.lastMag = grab.mag;
}

function onUp(e) {
  const g = grabs.get(e.pointerId);
  if (!g) return;
  grabs.delete(e.pointerId);
  canvas.style.cursor = 'default';
  Sound.bedStop(g.bed);
  const toy = g.toy;
  const gg = toy.grab;
  const releaseWorld = gg
    ? toy.mesh.localToWorld(_v1.copy(gg.hitLocal).add(gg.disp)).clone()
    : toy.mesh.position.clone();
  const intensity = toy.endGrab();
  Sound.release(toy.sfx, Math.min(1, .25 + intensity * .7), toy.mesh.position.x);
  Burst.burst(releaseWorld, 8 + Math.round(intensity * 14), .4 + intensity * .8);
  if (intensity > .45) { spawnHearts(releaseWorld, 2 + Math.round(intensity * 3)); navigator.vibrate?.(20); }
  bumpCount();
}

window.__slime = {
  toys, grabs, Sound, Burst, WaxShell, camera,
  select: i => select(i == null ? null : toys[i]),
  project(i) {
    const t = toys[i];

let last = performance.now();
function tick(now) {
  requestAnimationFrame(tick);
  const dt = Math.min(.033, (now - last) / 1000);
  last = now;
  const t = now / 1000;
  if (camTween) {
    const s = (t - camTween.t0) / camTween.dur;
    const ease = easeIO(Math.min(1, s));
    camera.position.lerpVectors(camTween.fp, camTween.tp, ease);
